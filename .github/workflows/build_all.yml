jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            llvm_prefix: /usr/lib/llvm-19
            artifact: target/release/tjlc
          - os: windows-latest
            llvm_prefix: C:\Program Files\LLVM
            artifact: target/release/tjlc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update && sudo apt-get install -y llvm-19-dev

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --version=19.1.0 --allow-downgrade

      - name: Set LLVM_SYS_190_PREFIX
        shell: bash
        run: echo "LLVM_SYS_190_PREFIX=${{ matrix.llvm_prefix }}" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: ${{ matrix.artifact }}