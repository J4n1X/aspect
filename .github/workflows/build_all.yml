"on":
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            llvm_prefix: /usr/lib/llvm-19
            artifact: target/release/aspc
          - os: windows-latest
            llvm_prefix: C:\Program Files\LLVM
            artifact: target/release/aspc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -L -o llvm.7z https://github.com/vovkos/llvm-package-windows/releases/download/llvm-19.1.7/llvm-19.1.7-windows-amd64-msvc17-msvcrt.7z
          7z x llvm.7z -o"C:/LLVM" -y

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update && sudo apt-get install -y llvm-19-dev libpolly-19-dev

          
      - name: Set LLVM prefixes
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "LLVM_SYS_190_PREFIX=C:/LLVM/llvm-19.1.7-windows-amd64-msvc17-msvcrt" >> $GITHUB_ENV
            echo "LLVM_SYS_191_PREFIX=C:/LLVM/llvm-19.1.7-windows-amd64-msvc17-msvcrt" >> $GITHUB_ENV
          else
            echo "LLVM_SYS_190_PREFIX=/usr/lib/llvm-19" >> $GITHUB_ENV
            echo "LLVM_SYS_191_PREFIX=/usr/lib/llvm-19" >> $GITHUB_ENV
          fi

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo build --release

      # Gates the job: a test failure fails the workflow even though the
      # artifact upload below still runs (if: always()).
      - name: Run tests
        run: cargo test --release

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: binary-${{ matrix.os }}
          path: ${{ matrix.artifact }}
